    <style>
          /* 1. Make sure the main browser frame is allowed to show its scrollbar */
      html, body {
        min-height: 100vh !important;
        overflow-y: auto !important;
      }

      /* 2. Hide the scrollbar track on EVERY element except the main HTML/BODY */
      *:not(html):not(body) {
        scrollbar-width: none !important; /* Firefox */
      }

      *:not(html):not(body)::-webkit-scrollbar {
        display: none !important; /* Chrome, Safari, Edge, Brave */
      }
    </style>
